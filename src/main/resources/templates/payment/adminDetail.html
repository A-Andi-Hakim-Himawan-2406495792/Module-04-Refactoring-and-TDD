<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Payment</title>
</head>
<body>
<h2>Manage Payment ID: <span th:text="${payment.id}"></span></h2>
<p>Current Status: <strong th:text="${payment.status}"></strong></p>

<form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
    <label>Set New Status:</label>
    <select name="status" required>
        <option value="SUCCESS">Accept (SUCCESS)</option>
        <option value="REJECTED">Reject (REJECTED)</option>
    </select>
    <button type="submit">Update Status</button>
</form>
<br>
<a th:href="@{/payment/admin/list}">Back to List</a>
</body>
</html>
