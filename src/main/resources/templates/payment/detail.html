<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
</head>
<body>
<h2>Payment Detail</h2>
<p>Payment ID: <span th:text="${payment.id}"></span></p>
<p>Method: <span th:text="${payment.method}"></span></p>
<p>Status: <strong th:text="${payment.status}"></strong></p>
<a th:href="@{/payment/detail}">Check Another</a>
</body>
</html>
