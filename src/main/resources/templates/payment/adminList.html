<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - All Payments</title>
</head>
<body>
<h2>All Payments (Admin)</h2>
<table border="1">
    <tr>
        <th>Payment ID</th>
        <th>Method</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    <tr th:each="payment : ${payments}">
        <td th:text="${payment.id}"></td>
        <td th:text="${payment.method}"></td>
        <td th:text="${payment.status}"></td>
        <td><a th:href="@{/payment/admin/detail/{id}(id=${payment.id})}">Manage</a></td>
    </tr>
</table>
</body>
</html>
